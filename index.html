<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="theme-color" content="#2C1F0F"/>
  <link rel="manifest" href="manifest.json"/>
  <!-- build:1782421145 v3 -->
  <title>Plant Care</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:smooth}
    body{background:#F5F1EB;font-family:-apple-system,system-ui,"Segoe UI",sans-serif;
      overscroll-behavior:none;-webkit-tap-highlight-color:transparent;-webkit-font-smoothing:antialiased}
    #root{min-height:100vh}
    #errbox{display:none;position:fixed;inset:0;background:#fff;z-index:9999;padding:20px;
      font-family:monospace;font-size:13px;overflow:auto;color:red;white-space:pre-wrap}
    input[type=range]{-webkit-appearance:none;height:6px;border-radius:3px;outline:none;cursor:pointer}
    input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;
      border-radius:50%;cursor:pointer;box-shadow:0 1px 4px rgba(0,0,0,0.2)}
  </style>
  <script>
    if(JSON.parse(localStorage.getItem("plantcare_dark")||"false"))
      document.documentElement.style.background="#121212";
  </script>
</head>
<body>
  <div id="errbox"></div>
  <div id="root"></div>
  <script src="react.js"></script>
  <script src="app.js"></script>
  <script>
    if("serviceWorker"in navigator)navigator.serviceWorker.register("service-worker.js");
  </script>
</body>
</html>
